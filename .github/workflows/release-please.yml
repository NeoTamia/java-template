name: Release Please Action

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    uses: NeoTamia/actions/.github/workflows/release-please.yml@da0f4095741fc1138ecdf68cc9efa6be0e6ab59c # main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit

  gitflow-release:
    name: Gitflow release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: NeoTamia/actions/.github/workflows/gitflow-release.yml@da0f4095741fc1138ecdf68cc9efa6be0e6ab59c # main
    permissions:
      contents: write
    secrets: inherit
    with:
      tag-name: ${{ needs.release-please.outputs.tag_name }}
      version: ${{ needs.release-please.outputs.version }}
